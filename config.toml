[relay]
source = "udp"          # tcp | serial | udp | file

# --- TCPSource (source = "tcp") ---
# Bridge Command NMEA TCP output. Configure in BC: Connections → NMEA → TCP server.
tcp_host = "localhost"
tcp_port = 55554

# --- SerialSource (source = "serial") ---
serial_device = "/dev/ttyUSB0"

# --- UDPSource (source = "udp") ---
udp_port = 10110

# --- FileSource (source = "file") ---
file_path = "relay/tests/fixtures/sample.nmea"

[sink]
# Relay TCP server — the daemon connects here.
port = 10110

[daemon]
relay_host = "localhost"  # set to radar's ip address
use_system_time = true    # set false if using historical data

[upload]
host = "crowdsource.kahu.earth"
port = 9900
# api_key is read from the KAHU_API_KEY environment variable; set it here as a
# fallback for dev use only — never commit a real key.
api_key = ""
points_per_track = 10     # flush a track batch to the server every N target detections
